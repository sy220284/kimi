# 数据源配置
# 注意: 已统一使用同花顺(THS)前复权数据

data_source:
  # 主数据源
  primary: THS
  
  # 数据源列表
  sources:
    THS:
      name: 同花顺
      type: pre_adjusted  # 前复权
      enabled: true
      priority: 1
      
    EastMoney:
      name: 东方财富
      type: pre_adjusted
      enabled: false  # 当前禁用，作为备选
      priority: 2
      
    # 已弃用数据源
    Tushare:
      name: Tushare
      type: none  # 不复权
      enabled: false
      deprecated: true
      reason: 数据不复权，与THS数据冲突
      
    AKShare:
      name: AKShare
      type: none
      enabled: false
      deprecated: true
      reason: 网络不稳定，已被THS替代

# 数据拉取流程
sync:
  # 批量拉取配置
  batch:
    enabled: true
    batch_size: 50
    delay_seconds: 1.2
    
  # 缓存配置
  cache:
    enabled: true
    directory: /tmp/quant_cache/
    format: csv
    auto_cleanup: true
    retention_hours: 24
    
  # 数据范围
  range:
    default_years: 5
    max_years: 10
    start_date: "2020-01-01"

# 数据质量
quality:
  # 价格校验
  price:
    min: 0.01
    max: 10000
    
  # 涨跌幅校验
  change_pct:
    min: -0.20
    max: 0.20
    
  # 成交量校验
  volume:
    min: 0

# 复权设置
adjustment:
  # 统一使用前复权
  type: pre_adjusted
  
  # 应用字段
  fields:
    - open
    - high
    - low
    - close

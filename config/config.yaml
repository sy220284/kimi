# A股量化分析系统配置 v2.0
# ⚠️ 安全：不要将 Key 写入此文件，请用环境变量或 .env 文件

# ─── 数据库 ───────────────────────────────────────
database:
  postgres:
    host: localhost
    port: 5432
    database: quant_analysis
    username: quant_user
    password: ${POSTGRES_PASSWORD:-quant_password}
    pool_size: 10
  redis:
    host: localhost
    port: 6379
    db: 0
    password: ${REDIS_PASSWORD:-}

# ─── 数据源 ───────────────────────────────────────
data_sources:
  ths:                          # 同花顺（主要来源）
    enabled: true
    timeout: 30
    default_ktype: "01"         # 01=日线
  akshare:                      # 备用
    enabled: false
  tushare:
    enabled: false
    token: ${TUSHARE_TOKEN:-}

# ─── 新系统分析参数 ───────────────────────────────
analysis:
  # Layer 2: 市场状态识别
  regime:
    trend_ma_short:  20
    trend_ma_medium: 60
    trend_ma_long:   120
    vol_lookback:    20
    crash_pct:       0.08      # 20日跌幅>8%触发系统性风险
    rally_pct:       0.15      # 20日涨幅>15%认为是政策底反弹

  # Layer 3: 多因子
  factors:
    weights:
      momentum:  35
      turnover:  20
      trend:     20
      rsi:       10
      vol_price: 10
      cost:       5
    min_score:   55.0          # 信号生成最低因子分
    rsi_overbought: 82         # A股适配（放宽至82）

  # Layer 4: 交易策略
  strategy:
    initial_capital:    100000
    atr_stop_mult:       2.0   # 止损 = 入场 - N×ATR
    min_stop_pct:        0.04
    max_stop_pct:        0.09
    target_lookback:     30    # 前N日高点作为目标价
    target_buffer:       0.02  # 目标价较前高留2%缓冲
    min_rr_ratio:        1.3
    max_holding_days:    20    # 匹配行业轮动周期
    trail_activation:    0.06  # 浮盈6%启用移动止盈
    trail_pct:           0.04  # 移动止盈回撤4%
    breakeven_pct:       0.04  # 浮盈4%后保本

  # 技术指标
  technical:
    ma_periods: [5, 20, 60, 120]
    rsi_period: 14
    macd:
      fast_period:   12
      slow_period:   26
      signal_period:  9
    kdj:
      k_period: 9
      d_period: 3
    bollinger_bands:
      period:  20
      std_dev:  2

# ─── API 服务 ──────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8000
  debug: false
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
  rate_limit_per_minute: 60

# ─── 调度（数据同步） ─────────────────────────────
scheduler:
  data_sync:
    frequency: "0 16 * * *"    # 每天16:00（收盘后同步）
    enabled: true

# ─── 日志 ─────────────────────────────────────────
logging:
  level: INFO
  file: /var/log/kimi.log
  max_size: 100MB
  backup_count: 10
